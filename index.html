<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Creative Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0a0a0a; color: #ededed; font-family: 'Inter', sans-serif; }
        .bento-card { background: #161616; border: 1px solid #262626; transition: all 0.3s ease; }
        .bento-card:hover { border-color: #3b82f6; transform: translateY(-4px); }
        .gradient-text { background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6 md:p-20">
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <div class="md:col-span-2 bento-card p-8 rounded-3xl flex flex-col justify-end min-h-[300px]">
            <h1 class="text-4xl font-bold mb-2">Hi, I'm <span class="gradient-text">Your Name</span>.</h1>
            <p class="text-gray-400 text-lg">Digital Architect & Creative Explorer. I build things that live on the internet.</p>
        </div>

        <div class="bento-card p-8 rounded-3xl flex flex-col items-center justify-center gap-6">
            <a href="#" class="hover:text-blue-500"><i data-lucide="github"></i></a>
            <a href="#" class="hover:text-blue-400"><i data-lucide="twitter"></i></a>
            <a href="#" class="hover:text-pink-500"><i data-lucide="instagram"></i></a>
        </div>

        <div class="bento-card p-6 rounded-3xl group">
            <div class="w-10 h-10 bg-blue-500/10 rounded-lg flex items-center justify-center mb-4 text-blue-500">
                <i data-lucide="layers"></i>
            </div>
            <h3 class="font-bold mb-1">Project Alpha</h3>
            <p class="text-sm text-gray-500">A revolutionary way to view the web.</p>
        </div>

        <div class="bento-card p-6 rounded-3xl flex items-center gap-4">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-sm font-medium">Available for new work</span>
        </div>

        <div class="bento-card p-6 rounded-3xl md:col-span-1">
            <h3 class="text-xs uppercase tracking-widest text-gray-500 mb-4 font-bold">Stack</h3>
            <div class="flex flex-wrap gap-2 text-xs">
                <span class="px-2 py-1 bg-white/5 rounded">React</span>
                <span class="px-2 py-1 bg-white/5 rounded">Tailwind</span>
                <span class="px-2 py-1 bg-white/5 rounded">Three.js</span>
            </div>
        </div>

    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
